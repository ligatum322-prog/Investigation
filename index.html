<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS/84</title>
    <style>
        /* ================= CSS (ESTILO E CORES) ================= */
        body {
            background-color: black;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            user-select: none; /* Impede de selecionar o texto */
            cursor: crosshair; /* Cursor retrô */
        }

        /* Telas (Estados) */
        #tela-boot, #tela-desktop, #tela-cmd, #tela-jumpscare {
            display: none;
            width: 100%;
            height: 100vh;
        }

        /* Cursor piscando do DOS */
        .cursor-pisca {
            display: inline-block;
            width: 10px;
            height: 1em;
            background-color: white;
            animation: piscar 1s step-end infinite;
            vertical-align: bottom;
        }

        @keyframes piscar {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Estilo do Ícone na Área de Trabalho */
        .icone-container {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 80px;
            text-align: center;
            cursor: pointer;
        }

        .icone {
            width: 60px;
            height: 40px;
            border: 2px solid white;
            margin: 0 auto 10px auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0s; /* Sem suavidade, bem anos 80 */
        }

        .icone::before {
            content: "";
            position: absolute;
            top: 5px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: white;
        }

        /* Inverte as cores ao passar o mouse (Hover) */
        .icone-container:hover .icone {
            background-color: white;
            color: black;
        }

        /* Estilo da tela de erro (CMD) */
        #tela-cmd {
            background-color: #aa0000; /* Vermelho escuro clássico de erro */
            color: white;
            padding: 20px;
            box-sizing: border-box;
            font-size: 1.2rem;
            white-space: pre-wrap;
        }

        /* Jumpscare Final */
        #tela-jumpscare {
            background-color: red;
            color: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            animation: tremor 0.1s infinite;
        }

        @keyframes tremor {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <div id="tela-boot">
        <div id="boot-texto"></div>
        <div class="cursor-pisca"></div>
    </div>

    <div id="tela-desktop">
        <div>A:\> DESKTOP</div>
        <div class="icone-container" onclick="ativarVirus()">
            <div class="icone">TXT</div>
            <div>AVISO.TXT</div>
        </div>
    </div>

    <div id="tela-cmd"></div>

    <div id="tela-jumpscare">
        VOCÊ FOI INFECTADO
        <div style="font-size: 1.5rem; margin-top: 20px;">O JOGO TE ENCONTROU</div>
    </div>

    <script>
        /* ================= JAVASCRIPT (LÓGICA E EVENTOS) ================= */
        
        // Sequência de Boot
        const linhasBoot = [
            "SISTEMA OPERACIONAL OS/84 v1.0",
            "CHECANDO MEMORIA RAM... 640K OK",
            "MONTANDO DISCO C:\\...",
            "INICIANDO INTERFACE GRAFICA..."
        ];

        let bootIndex = 0;
        const telaBoot = document.getElementById('tela-boot');
        const bootTexto = document.getElementById('boot-texto');
        const telaDesktop = document.getElementById('tela-desktop');

        // Inicia o processo quando a página carrega
        window.onload = () => {
            telaBoot.style.display = 'block';
            mostrarLinhaBoot();
        };

        function mostrarLinhaBoot() {
            if (bootIndex < linhasBoot.length) {
                bootTexto.innerHTML += linhasBoot[bootIndex] + "<br><br>";
                bootIndex++;
                setTimeout(mostrarLinhaBoot, 800); // 800ms por linha
            } else {
                setTimeout(() => {
                    telaBoot.style.display = 'none';
                    telaDesktop.style.display = 'block';
                }, 1000);
            }
        }

        // Função ativada ao clicar no arquivo
        let virusAtivado = false;

        function ativarVirus() {
            if (virusAtivado) return; // Evita duplo clique
            virusAtivado = true;

            // 1. FORÇA O DOWNLOAD DO ARQUIVO ASSUSTADOR
            const conteudoArquivo = "Você não deveria ter voltado para casa.\nO JOGO TE ENCONTROU.\nDelete isso NÃO vai ajudar.";
            const blob = new Blob([conteudoArquivo], { type: 'text/plain' });
            const linkDownload = document.createElement('a');
            linkDownload.href = URL.createObjectURL(blob);
            linkDownload.download = "AVISO_LEIA_AGORA.txt";
            document.body.appendChild(linkDownload);
            linkDownload.click();
            document.body.removeChild(linkDownload);

            // 2. MUDA PARA A TELA DE CMD
            telaDesktop.style.display = 'none';
            const telaCmd = document.getElementById('tela-cmd');
            telaCmd.style.display = 'block';

            // 3. ANIMAÇÃO DE DIGITAÇÃO DO CMD
            const cmdComandos = [
                "========================================",
                "       ANTIVIRUS EMERGENCIA CRITICA     ",
                "========================================",
                "",
                "[SCANNING...] 10%... 45%... 100% INFECTADO",
                "",
                "VIRUS DETECTADO: 'JOGO_MALDICAO.exe'",
                "ORIGEM: Seu Desktop",
                "NIVEL: CRITICO - NAO PODE SER REMOVIDO",
                "",
                "[AVISO] O sistema foi comprometido.",
                "",
                "REINICIANDO SISTEMA EM 3...",
                "2...",
                "1..."
            ];

            let cmdIndex = 0;
            function digitarCmd() {
                if (cmdIndex < cmdComandos.length) {
                    telaCmd.innerHTML += cmdComandos[cmdIndex] + "<br>";
                    cmdIndex++;
                    // Acelera no final
                    let velocidade = cmdIndex > 10 ? 300 : 700;
                    setTimeout(digitarCmd, velocidade);
                } else {
                    // Após terminar o CMD, chama o Jumpscare
                    setTimeout(mostrarJumpscare, 500);
                }
            }
            
            // Inicia a digitação falsa do CMD
            digitarCmd();
        }

        // 4. MOSTRA O JUMPSCARE E TRAVA A TELA
        function mostrarJumpscare() {
            document.getElementById('tela-cmd').style.display = 'none';
            const jumpscare = document.getElementById('tela-jumpscare');
            jumpscare.style.display = 'flex';
            
            // Opcional: Recarrega a página infinitamente após 3 segundos
            setTimeout(() => {
                location.reload();
            }, 3000);
        }
    </script>
</body>
</html>
