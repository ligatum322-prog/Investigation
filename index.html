<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNAF Clone - Sobreviva até as 6 AM</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #1a1a1a;
            border: 2px solid #333;
            overflow: hidden;
            background-image: radial-gradient(circle, #333 10%, #000 80%);
        }

        /* Interface (HUD) */
        #hud {
            position: absolute;
            top: 10px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
        }

        #power-meter { color: #4caf50; }
        #clock { color: #fff; }

        /* A Sala / Porta */
        #door-frame {
            position: absolute;
            left: 50px;
            top: 150px;
            width: 150px;
            height: 400px;
            background-color: #0d0d0d;
            border: 5px solid #444;
        }

        #door {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 0%; /* 100% quando fechada */
            background-color: #555;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 20px, #333 20px, #333 40px);
            transition: height 0.3s ease;
        }

        /* Botão da Porta */
        #door-btn {
            position: absolute;
            left: 220px;
            top: 300px;
            padding: 15px 20px;
            font-size: 16px;
            background-color: #d32f2f;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #door-btn.closed { background-color: #388e3c; }

        /* O Animatronic (Inimigo) */
        #animatronic {
            position: absolute;
            left: 80px;
            top: 300px;
            width: 90px;
            height: 150px;
            background-color: red;
            border-radius: 45px 45px 0 0;
            opacity: 0;
            transition: opacity 0.5s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
        }

        /* Telas de Fim de Jogo */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #overlay h1 { font-size: 60px; margin: 0; }
        #overlay p { font-size: 20px; }
        .jumpscare { background-color: red !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div id="power-meter">Energia: <span id="power">100</span>%</div>
            <div id="clock"><span id="time">12</span> AM</div>
        </div>

        <div id="door-frame">
            <div id="animatronic">🐻</div>
            <div id="door"></div>
        </div>

        <button id="door-btn" onclick="toggleDoor()">FECHAR PORTA</button>

        <div id="overlay">
            <h1 id="end-title">Game Over</h1>
            <p id="end-desc">Você não sobreviveu.</p>
            <button onclick="location.reload()" style="margin-top:20px; padding: 10px; cursor:pointer;">Tentar Novamente</button>
        </div>
    </div>

    <script>
        // Variáveis do Jogo
        let power = 100;
        let time = 0; // 0 representa 12 AM
        let isDoorClosed = false;
        let animatronicStage = 0; // 0 a 4 (0 é longe, 4 é na porta)
        let gameActive = true;

        // Elementos do DOM
        const powerEl = document.getElementById('power');
        const timeEl = document.getElementById('time');
        const doorEl = document.getElementById('door');
        const doorBtn = document.getElementById('door-btn');
        const animatronicEl = document.getElementById('animatronic');
        const overlay = document.getElementById('overlay');
        const endTitle = document.getElementById('end-title');

        // Loop de Energia (cai a cada segundo)
        setInterval(() => {
            if (!gameActive) return;
            
            let drainRate = isDoorClosed ? 2 : 0.5; // Porta fechada gasta muita energia
            power -= drainRate;

            if (power <= 0) {
                power = 0;
                powerOutage();
            }
            powerEl.innerText = Math.floor(power);
        }, 1000);

        // Loop de Tempo (1 hora a cada 10 segundos para testar rápido)
        setInterval(() => {
            if (!gameActive) return;
            
            time++;
            let displayTime = time === 0 ? 12 : time;
            timeEl.innerText = displayTime;

            if (time >= 6) {
                winGame();
            }
        }, 10000); // Mude para 60000 (1 minuto) para um jogo real

        // Loop do Animatronic (IA Básica)
        setInterval(() => {
            if (!gameActive || power <= 0) return;

            // Chance do animatronic avançar
            if (Math.random() > 0.4) { 
                animatronicStage++;
            }

            // Atualiza o visual
            if (animatronicStage === 3) {
                // Aparece na porta
                animatronicEl.style.opacity = '1';
            } else if (animatronicStage > 3) {
                // Tenta atacar
                if (isDoorClosed) {
                    // Bateu na porta e volta pro início
                    animatronicStage = 0;
                    animatronicEl.style.opacity = '0';
                    power -= 5; // Perde um pouco de energia pela batida
                } else {
                    // Jumpscare!
                    jumpscare();
                }
            }
        }, 3000); // A cada 3 segundos ele pensa se vai mover

        // Função do botão da porta
        function toggleDoor() {
            if (!gameActive || power <= 0) return;

            isDoorClosed = !isDoorClosed;
            if (isDoorClosed) {
                doorEl.style.height = '100%';
                doorBtn.innerText = 'ABRIR PORTA';
                doorBtn.classList.add('closed');
            } else {
                doorEl.style.height = '0%';
                doorBtn.innerText = 'FECHAR PORTA';
                doorBtn.classList.remove('closed');
            }
        }

        // Fim de jogo: Acabou a energia
        function powerOutage() {
            isDoorClosed = false;
            doorEl.style.height = '0%';
            doorBtn.disabled = true;
            document.getElementById('game-container').style.backgroundImage = 'none';
            document.getElementById('game-container').style.backgroundColor = '#000';
            animatronicEl.style.opacity = '0'; // Fica tudo escuro
            
            setTimeout(() => {
                jumpscare();
            }, 4000); // Jumpscare no escuro após 4 segundos
        }

        // Fim de Jogo: Perdeu
        function jumpscare() {
            gameActive = false;
            overlay.style.display = 'flex';
            overlay.classList.add('jumpscare');
            endTitle.innerText = "JUMPSCARE!";
            document.getElementById('end-desc').innerText = "O Animatronic te pegou.";
        }

        // Fim de Jogo: Venceu
        function winGame() {
            gameActive = false;
            overlay.style.display = 'flex';
            endTitle.innerText = "6:00 AM";
            document.getElementById('end-desc').innerText = "Parabéns, você sobreviveu à noite!";
        }
    </script>
</body>
</html>
